# Statically link the MSVC C runtime on Windows so end users don't need to
# install the Visual C++ Redistributable to run the shipped .exe.
[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "target-feature=+crt-static"]

[target.aarch64-pc-windows-msvc]
rustflags = ["-C", "target-feature=+crt-static"]
