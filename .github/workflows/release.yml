name: build-and-release

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

permissions:
  contents: write

# Force bash for all inline `run:` scripts so bash syntax (e.g. `if [[ ... ]]`)
# works on every runner, including windows-latest which defaults to PowerShell.
defaults:
  run:
    shell: bash

jobs:
  # ── CI check: does it build on every push/PR? (no release) ──────────────
  build:
    name: build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install JS deps
        run: npm ci && npm --prefix tauri-app ci

      - name: Install Chromium (PDF export)
        run: npx playwright install chromium

      - name: Build (CI only — no bundle)
        # beforeBuildCommand (before-build.sh) runs vite + bundle-core automatically.
        run: npm run tauri build
        env:
          CI: true

  # ── Release: publish official (production) artifacts to a GitHub Release.
  #    Runs on a version tag (v*) OR any push to main. Tag pushes publish under
  #    the app version (v__VERSION__); main pushes get a unique tag
  #    (v__VERSION__-<sha>) so repeated pushes never collide. ───────────────
  release:
    name: release (${{ matrix.platform }})
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: build
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install JS deps
        run: npm ci && npm --prefix tauri-app ci

      - name: Install Chromium (PDF export)
        run: npx playwright install chromium

      # Compute the release tag: use the app version for tag pushes, and a
      # version+sha tag for plain main pushes (keeps each push a distinct,
      # installable official release without overwriting the previous one).
      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            VER="$(grep -m1 '"version"' tauri-app/src-tauri/tauri.conf.json | sed -E 's/.*"version"[[:space:]]*:[[:space:]]*"([^"]+)".*/\1/')"
            echo "tag=v${VER}-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI: true
        with:
          tagName: ${{ steps.tag.outputs.tag }}
          releaseName: "mdTool v__VERSION__"
          releaseBody: "See the assets to download this version."
          releaseDraft: false
          prerelease: false

      # ── macOS DMG fallback: Tauri's vendored create-dmg can fail on macOS 26
      #    ("Resource busy"). The .app is already built on this same runner, so
      #    if the .dmg is missing we rebuild it with make-dmg.sh. ──
      - name: Check for existing dmg (macOS only)
        if: matrix.platform == 'macos-latest'
        id: check
        shell: bash
        run: |
          DMG=$(ls tauri-app/src-tauri/target/release/bundle/dmg/*.dmg 2>/dev/null || true)
          if [ -z "$DMG" ]; then echo "missing=true" >> "$GITHUB_OUTPUT"; fi

      - name: Rebuild dmg via make-dmg.sh (macOS only)
        if: matrix.platform == 'macos-latest' && steps.check.outputs.missing == 'true'
        run: npm run make-dmg

      - name: Upload dmg (macOS only)
        if: matrix.platform == 'macos-latest' && steps.check.outputs.missing == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: tauri-app/src-tauri/target/release/bundle/dmg/*.dmg

  # ── macOS DMG fallback (separate job): if the release job's dmg failed or a
  #    runner-level issue left the .app behind without a dmg, rebuild it here.
  #    This re-runs the full build (app bundles are not shared between jobs). ──
  macos-dmg:
    name: macos dmg (fallback)
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install JS deps
        run: npm ci && npm --prefix tauri-app ci

      - name: Install Chromium (PDF export)
        run: npx playwright install chromium

      - name: Build the .app bundle
        run: npm run tauri build
        env:
          CI: true

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            VER="$(grep -m1 '"version"' tauri-app/src-tauri/tauri.conf.json | sed -E 's/.*"version"[[:space:]]*:[[:space:]]*"([^"]+)".*/\1/')"
            echo "tag=v${VER}-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for existing dmg
        id: check
        shell: bash
        run: |
          DMG=$(ls tauri-app/src-tauri/target/release/bundle/dmg/*.dmg 2>/dev/null || true)
          if [ -z "$DMG" ]; then echo "missing=true" >> "$GITHUB_OUTPUT"; fi

      - name: Rebuild dmg via make-dmg.sh
        if: steps.check.outputs.missing == 'true'
        run: npm run make-dmg

      - name: Upload dmg
        if: steps.check.outputs.missing == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: tauri-app/src-tauri/target/release/bundle/dmg/*.dmg
